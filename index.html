    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
        @theme {
            --primary-color: #212A55;
            --acent-color: #E2F9FE;
            --secondary-color: #55BAB4;
            --My-yellow: #F5C644;
            --Semantic-red: #D62839;
            --Semantic-green: #136F63;
            --Neutrals-w: #FFFFFF;
            --Neutrals-b: #1C1B17;
            --p-1: #F8FAFC;
            --p-2: #8E1B32
            --p-3: #636A86;
            --p-4: #EDEEF2;
            --p-5: #B6BDC7;
      }

        @keyframes typing {
            0%, 10% { width: 0; }        /* รอ 10% ก่อนเริ่มพิมพ์ */
            40%, 60% { width: 100%; }    /* พิมพ์เสร็จแล้วค้างไว้ให้คนอ่านแป๊บนึง */
            90%, 100% { width: 0; }      /* ถอยกลับไปที่ศูนย์ (หรือจะให้หายวับไปเลยก็ได้) */
        }

        @keyframes blink {
            from, to { border-color: transparent; }
            50% { border-color: white; }
        }

        .animate-typing {
        /* - 2s คือเวลาที่ใช้พิมพ์ (ปรับให้ช้าลงได้โดยเพิ่มตัวเลข)
            - steps(8) คือจำนวนตัวอักษร "ABOUT ME" (รวมช่องว่างคือ 8 ตัว)
        */
        display: inline-block;
        width: 0;
        overflow: hidden;
        white-space: nowrap;
        animation: 
            typing 4s steps(8) infinite,
            blink 0.75s step-end infinite;
        }
    </style>
</head>
